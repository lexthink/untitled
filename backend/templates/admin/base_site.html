{% extends "admin/base.html" %}

{% block branding %}
  {{ block.super }}
  {% if user_organizations %}
    <select onchange="if(this.value) window.location=this.value"
            style="margin-left: 16px; padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: inherit; cursor: pointer; vertical-align: middle;">
      <option value="{% url 'clear-organization' %}" {% if not active_organization %}selected{% endif %}>
        No organization
      </option>
      {% for org in user_organizations %}
        <option value="{% url 'switch-organization' org.pk %}"
                {% if active_organization and org.pk == active_organization.pk %}selected{% endif %}>
          {{ org.name }}
        </option>
      {% endfor %}
    </select>
  {% endif %}
{% endblock %}
