name: Backend CI

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  COMPOSE_FILE: docker-compose.local.yaml

on:
  pull_request:
    branches: ['main']
    paths:
      - 'backend/**'
      - 'compose/**/backend/**'
      - 'docker-compose.local.yaml'
      - '.github/workflows/ci-backend.yaml'

  push:
    branches: ['main']
    paths:
      - 'backend/**'
      - 'compose/**/backend/**'
      - 'docker-compose.local.yaml'
      - '.github/workflows/ci-backend.yaml'

concurrency:
  group: backend-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'backend/.python-version'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        run: docker compose --profile backend build
        env:
          BUILDX_CACHE_FROM: type=gha,scope=backend
          BUILDX_CACHE_TO: type=gha,scope=backend,mode=max

      - name: Check DB Migrations
        run: docker compose --profile backend run --rm backend python manage.py makemigrations --check

      - name: Run DB Migrations
        run: docker compose --profile backend run --rm backend python manage.py migrate

      - name: Run Tests
        run: docker compose --profile backend run --rm backend pytest

      - name: Tear down
        if: always()
        run: docker compose --profile backend down -v
