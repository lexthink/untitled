name: CI

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ['main']

  push:
    branches: ['main']

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'backend/.python-version'
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache local backend
        uses: docker/bake-action@v7
        with:
          push: false
          load: true
          files: docker-compose.local.yaml
          targets: backend
          set: |
            backend.cache-from=type=gha,scope=backend-cached-tests
            backend.cache-to=type=gha,scope=backend-cached-tests,mode=max

      - name: Check DB Migrations
        run: docker compose -f docker-compose.local.yaml run --rm backend python manage.py makemigrations --check

      - name: Run DB Migrations
        run: docker compose -f docker-compose.local.yaml run --rm backend python manage.py migrate

      - name: Run Django Tests
        run: docker compose -f docker-compose.local.yaml run backend pytest

      - name: Tear down the Stack
        run: docker compose -f docker-compose.local.yaml --profile backend down
